<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxEasy - Keyboard</title>
    <style>
        /* Disable dragging for all elements */
        * {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap');

        :root {
            /* Updated color variables for Vision Pro style */
            --bg-color: rgba(255, 255, 255, 0.18);
            --text-color: #333333;
            --item-bg: rgba(255, 255, 255, 0.15);
            --item-border: rgba(255, 255, 255, 0.2);
            --item-hover: rgba(255, 255, 255, 0.25);
            --item-selected: rgba(51, 51, 51, 0.15);
            --shadow-light: rgba(255, 255, 255, 0.5);
            --shadow-dark: rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #cfeaff 0%, #f3f3f4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: var(--text-color);
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            transition: all 0.3s ease;
        }

        .container {
            background: var(--bg-color);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 18px;
            padding: 40px;
            box-shadow: 
                0 8px 24px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
            max-width: 3000px;
            width: 100%;
            max-height: 900px;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--item-border);
            animation: containerFadeIn 0.5s ease-out;
            overflow: visible;
        }

        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 6px;
            margin-top: 15px;
            padding: 10px;
        }

        .key {
            background: var(--item-bg);
            border: 1px solid var(--item-border);
            border-radius: 12px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 30px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 
                0 4px 6px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .key:hover {
            background: var(--item-hover);
            transform: translateY(-2px);
            box-shadow: 
                0 8px 16px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .key:active {
            transform: translateY(0);
            box-shadow: 
                0 4px 8px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .selected-choices {
            background: var(--item-bg);
            border: 1px solid var(--item-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            flex-grow: 0;
            display: flex;
            flex-direction: column;
            min-height: 80px;
            max-height: 100px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 
                0 4px 12px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .selected-item {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--item-border);
            border-radius: 15px;
            padding: 10px 15px;
            font-size: 1.3em;
            line-height: 1.2;
            min-height: 1.2em;
            position: relative;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .speak-button {
            background: #333333;
            color: #ffffff;
            border: none;
            padding: 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.6em;
            transition: all 0.3s ease;
            margin-top: 15px;
            text-align: center;
            box-shadow: 
                0 4px 6px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .speak-button:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 16px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .speak-button:active {
            transform: translateY(0);
            box-shadow: 
                0 4px 8px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .dark-mode .speak-button {
            background: #ffffff;
            color: #333333;
        }

        .prediction {
            background: var(--item-bg);
            border: 1px solid var(--item-border);
            border-radius: 12px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            margin: 0 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
            font-size: 0.9em;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 
                0 4px 6px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .prediction:hover {
            background: var(--item-hover);
            transform: translateY(-2px);
            box-shadow: 
                0 8px 16px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .prediction:active {
            transform: translateY(0);
            box-shadow: 
                0 4px 8px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .nav-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            padding: 12px 24px;
            margin: 0 5px;
            text-decoration: none;
            color: var(--text-color);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.15),
                inset 0 0 0 1px rgba(255, 255, 255, 0.15),
                inset 0 0 0 2px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .nav-item:active {
            transform: translateY(0);
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item[href="keyboard.html"] {
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 
                0 16px 48px rgba(0, 0, 0, 0.2),
                inset 0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 0 0 2px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark-mode {
            --bg-color: rgba(0, 0, 0, 0.18);
            --text-color: #ffffff;
            --item-bg: rgba(255, 255, 255, 0.1);
            --item-border: rgba(255, 255, 255, 0.1);
            --item-hover: rgba(255, 255, 255, 0.15);
            --item-selected: rgba(255, 255, 255, 0.2);
            --shadow-light: rgba(255, 255, 255, 0.1);
            --shadow-dark: rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2e 100%);
        }

        .dark-mode .container {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .dark-mode .nav-item {
            background: rgba(0, 0, 0, 0.05);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.2),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 0 0 2px rgba(255, 255, 255, 0.02);
        }

        .dark-mode .nav-item:hover {
            background: rgba(0, 0, 0, 0.08);
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.25),
                inset 0 0 0 1px rgba(255, 255, 255, 0.08),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .dark-mode .nav-item:active {
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.15),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 0 0 2px rgba(255, 255, 255, 0.02);
        }

        .dark-mode .nav-item[href="keyboard.html"] {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 16px 48px rgba(0, 0, 0, 0.3),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .navigation {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--item-border);
            text-align: center;
            width: 100%; /* Make the line span the entire width */
        }

        .nav-item {
            padding: 10px 20px;
            margin: 0 5px;
            text-decoration: none;
            color: var(--text-color);
            background-color: var(--item-bg);
            border-radius: 20px;
            transition: background-color 0s;
            text-align: center;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 500;
            font-size: 2.5em;
            color: var(--text-color);
        }

        .key.wide {
            grid-column: span 2;
            font-size: 1.5em;
            font-weight: 500;
        }

        .selected-list {
            flex-grow: 1;
            display: flex;
            align-items: flex-end;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: var(--text-color);
            margin-left: 1px;
            animation: blink 0.7s infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .bottom-buttons {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .back-button {
            background: var(--item-bg);
            border: 1px solid var(--item-border);
            color: var(--text-color);
            padding: 15px 30px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0s ease;
            text-decoration: none;
            display: inline-block;
        }

        .back-button:hover {
            background: var(--item-hover);
        }

        .backspace-icon {
            width: 38px;
            height: 38px;
            display: block;
            margin: 0 auto;
        }

        .shift-icon {
            width: 32px;
            height: 32px;
            display: block;
            margin: 0 auto;
        }

        #shift.active .shift-icon {
            filter: brightness(0) invert(1);
        }

        #shift.active {
            background-color: var(--text-color);
        }

        .prediction-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            height: 35px;
        }

        .toggle-switch {
            margin-bottom: 20px;
        }

        .toggle-input {
            display: none;
        }

        .toggle-label {
            display: inline-block;
            width: 60px;
            height: 34px;
            background-color: var(--text-color);
            border-radius: 34px;
            position: relative;
            cursor: pointer;
            transition: background-color 0s;
        }

        .toggle-label:before {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            top: 4px;
            left: 4px;
            background-color: var(--bg-color);
            transition: 0s;
        }

        .toggle-input:checked + .toggle-label {
            background-color: #ccc;
        }

        .toggle-input:checked + .toggle-label:before {
            transform: translateX(26px);
            background-color: var(--text-color);
        }

        #backspace img.backspace-icon {
            filter: brightness(0); /* Default to black in light mode */
        }

        .language-dropdown {
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 1em;
            background: var(--item-bg);
            border: 1px solid var(--item-border);
            color: var(--text-color);
            box-shadow: 0 4px 6px var(--shadow-dark);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s ease;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23333333%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 12px;
            padding-right: 30px;
            width: 140px;
        }
        
        .language-dropdown:hover {
            background: var(--item-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px var(--shadow-dark);
        }
        
        .language-dropdown:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--shadow-light), 0 8px 16px var(--shadow-dark);
        }
        
        .dark-mode .language-dropdown {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
        }

        /* Custom styling for dropdown options - requires a custom select implementation */
        select.language-dropdown option {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 10px;
            font-size: 1em;
        }

        .dark-mode select.language-dropdown option {
            background-color: rgba(50, 50, 50, 0.95);
            color: white;
        }

        /* For Firefox */
        select.language-dropdown {
            scrollbar-width: thin;
            scrollbar-color: var(--item-border) var(--bg-color);
        }

        /* For Chrome/Edge/Safari */
        select.language-dropdown::-webkit-scrollbar {
            width: 8px;
        }

        select.language-dropdown::-webkit-scrollbar-track {
            background: var(--bg-color);
            border-radius: 10px;
        }

        select.language-dropdown::-webkit-scrollbar-thumb {
            background-color: var(--item-border);
            border-radius: 10px;
            border: 2px solid var(--bg-color);
        }
    </style>
</head>

        // Initialize the appropriate keyboard layout
        function updateKeyboardLayout() {
            const layout = keyboardLayouts[currentLanguage];
            const keyElements = document.querySelectorAll('#alphabetKeyboard .key:not(.wide)');
            
            // Update regular keys
            keyElements.forEach((key, index) => {
                if (index < layout.main.length) {
                    key.textContent = isUpperCase ? layout.main[index].toUpperCase() : layout.main[index].toLowerCase();
                }
            });
            
            // FORCE UPDATE all special keys regardless of current text
            document.getElementById('toggleCase').textContent = layout.shiftText;
            
            // Find space key and update it
            document.querySelectorAll('.key').forEach(key => {
                // Reset any previous special actions
                key.removeAttribute('data-action');
                
                // Check if this is the space key (it's the wide one in the middle of the bottom row)
                if (key.className.includes('wide') && key.textContent.toLowerCase().includes('space') || 
                    key.textContent.includes('スペース') || key.textContent.includes('ESPACE') || 
                    key.textContent.includes('ESPACIO') || key.textContent.includes('LEERTASTE') ||
                    key.textContent.includes('SPAZIO') || key.textContent.includes('ESPAÇO') ||
                    key.textContent.includes('ПРОБЕЛ') || key.textContent.includes('空格') ||
                    key.textContent.includes('스페이스') || key.textContent.includes('مسافة') ||
                    key.textContent.includes('स्पेस')) {
                    key.textContent = layout.spaceText;
                    key.dataset.action = 'space';
                }
                
                // Check if this is the clear key
                else if (key.className.includes('wide') && (key.textContent.toLowerCase().includes('clear') || 
                    key.textContent.includes('クリア') || key.textContent.includes('EFFACER') || 
                    key.textContent.includes('BORRAR') || key.textContent.includes('LÖSCHEN') ||
                    key.textContent.includes('CANCELLA') || key.textContent.includes('LIMPAR') ||
                    key.textContent.includes('ОЧИСТИТЬ') || key.textContent.includes('清除') ||
                    key.textContent.includes('지우기') || key.textContent.includes('مسح') ||
                    key.textContent.includes('साफ़'))) {
                    key.textContent = layout.clearText;
                    key.dataset.action = 'clear';
                }
                
                // Check if this is the numbers key
                else if (key.id === 'switchToNumbers') {
                    key.textContent = layout.numbersText;
                }
            });
            
            // Set speak button to current language
            speakButton.textContent = 'SPEAK';
            
            // Update speech synthesis language
            if (window.speechSynthesis) {
                speechSynthesis.cancel();
            }
        }
        
        // Unified async language change handler
        languageSelect.addEventListener('change', async function() {
            const oldLanguage = currentLanguage;
            const oldLanguageName = languageSelect.options[languageSelect.selectedIndex].text;
            const textToTranslate = currentText;
            const newLanguage = this.value;
            currentLanguage = newLanguage;
            localStorage.setItem('keyboardLanguage', newLanguage);

            // Translate the text buffer
            if (textToTranslate.trim() !== '') {
                try {
                    selectedList.innerHTML = `<div class=\"selected-item\"> </div>`;
                    const translatedText = await translateWithAPI(textToTranslate, newLanguage);
                    currentText = translatedText;
                } catch (error) {
                    console.error('Translation failed:', error);
                    selectedList.innerHTML = `<div class=\"selected-item\">Translation failed. Keeping original text.</div>`;
                    setTimeout(() => updateSelectedList(), 2000);
                }
            }
            // Update the keyboard layout and selected list
            updateKeyboardLayout();
            updateSelectedList();
            // Translate the navigation bar
            await translateNavBar(newLanguage);
            // Log language change
            logAction(`Language changed from ${oldLanguageName} to ${languageSelect.options[languageSelect.selectedIndex].text}`);
        });

        function updatePredictions() {
            const words = currentText.split(' ');
            const currentWord = words[words.length - 1].toLowerCase();
           
            let predictions = [];
            if (currentWord.length > 0) {
                predictions = commonWords
                    .filter(word => word.toLowerCase().startsWith(currentWord))
                    .slice(0, 3);
            }
           
            const predictionElements = predictionBar.querySelectorAll('.prediction');
           
            predictionElements.forEach((elem, index) => {
                if (index < predictions.length) {
                    const word = isUpperCase ? predictions[index].toUpperCase() : predictions[index].toLowerCase();
                    elem.textContent = word;
                    elem.onclick = () => {
                        words[words.length - 1] = word;
                        currentText = words.join(' ') + ' ';
                        updateSelectedList();
                    };
                } else {
                    elem.textContent = '';
                    elem.onclick = null;
                }
            });
        }


        // Initial call to set up prediction boxes
        updatePredictions();


        function updateSelectedList() {
            let words = currentText.split(' ');
            let lastWord = words[words.length - 1];
            let correctedWord = autocorrect(lastWord);
           
            if (correctedWord.toLowerCase() !== lastWord.toLowerCase()) {
                words[words.length - 1] = correctedWord;
                currentText = words.join(' ') + ' '; // Add space after autocorrection
            }


            // Apply the current case to the entire text
            currentText = isUpperCase ? currentText.toUpperCase() : currentText.toLowerCase();


            const textWithCursor = currentText + '<span class="cursor"></span>';
            selectedList.innerHTML = `<div class="selected-item">${textWithCursor}</div>`;
            updatePredictions();
        }


        // Modify the key click event listener
        document.querySelectorAll('.keyboard .key').forEach(key => {
            key.addEventListener('click', () => {
                if (key.id === 'switchToNumbers' || key.id === 'switchToAlphabet') {
                    return; // Do nothing for these keys
                }
                
                console.log('Key clicked:', key.id || key.textContent, 'Action:', key.dataset.action);
                
                // Use data-action attribute to determine behavior
                if (key.dataset.action === 'clear') {
                    currentText = '';
                } else if (key.dataset.action === 'space' || key.textContent === keyboardLayouts[currentLanguage].spaceText) {
                    currentText += ' ';
                    updateSelectedList(); // Apply autocorrect when space is pressed
                } else if (key.id === 'backspace') {
                    currentText = currentText.slice(0, -1);
                } else if (key.id === 'toggleCase') {
                    // Do nothing, handled by separate event listener
                } else {
                    currentText += key.textContent;
                }
                updateSelectedList();
            });
        });


        speakButton.addEventListener('click', () => {
            console.log('Speak button clicked');
            if (isSpeaking) {
                stopSpeaking();
            } else {
                speak(currentText);
            }
        });


        // Initial update of the selected list
        updateSelectedList();


        function speak(text) {
            if ('speechSynthesis' in window) {
                stopSpeaking();
               
                const utterance = new SpeechSynthesisUtterance(text);
                
                // Set language for speech synthesis based on current keyboard language
                const langMap = {
                    'en': 'en-US',
                    'es': 'es-ES',
                    'fr': 'fr-FR',
                    'de': 'de-DE',
                    'it': 'it-IT',
                    'pt': 'pt-PT',
                    'ru': 'ru-RU',
                    'zh': 'zh-CN',
                    'ja': 'ja-JP',
                    'ko': 'ko-KR',
                    'ar': 'ar-SA',
                    'hi': 'hi-IN'
                };
                
                utterance.lang = langMap[currentLanguage] || 'en-US';
               
                utterance.onstart = () => {
                    console.log('Speech started');
                    isSpeaking = true;
                    speakButton.textContent = 'SPEAK';
                };


                utterance.onend = () => {
                    console.log('Speech finished');
                    resetSpeakButton();
                    addToLog(`Spoken (${langMap[currentLanguage]}): ${text}`);
                };


                utterance.onerror = () => {
                    console.log('Speech error occurred');
                    resetSpeakButton();
                };


                speechSynthesis.speak(utterance);
            } else {
                console.log('Text-to-speech not supported in this browser');
            }
        }


        function stopSpeaking() {
            speechSynthesis.cancel();
            resetSpeakButton();
        }


        function resetSpeakButton() {
            isSpeaking = false;
            speakButton.textContent = 'SPEAK';
        }


        function addToLog(message) {
            // Retrieve existing logs or initialize an empty array
            let logs = JSON.parse(localStorage.getItem('ccpcsLog')) || []
            // Add the new message to the logs
            logs.push({ action: message, timestamp: new Date().toISOString() })
            // Store the updated logs back in local storage
            localStorage.setItem('ccpcsLog', JSON.stringify(logs))
            console.log('Logged:', message)
        }

            body.classList.add('dark-mode');

                updateIconColors('white'); // Set icons to white

                localStorage.setItem('darkMode', 'disabled');
                updateIconColors('black'); // Set icons to black
            }

        function updateIconColors(color) {
            const backspaceIcons = document.querySelectorAll('.backspace-icon');
            backspaceIcons.forEach(icon => {
                if (icon) {
                    // Update the filter to change the icon color
                    icon.style.filter = color === 'white' ? 'brightness(0) invert(1)' : 'brightness(0)';
                }
            });
        }

                keyboardButton.style.border = '0px solid white';

                keyboardButton.style.border = '0px solid black';
            }
        }

        updateKeyboardButtonBorder();

        toggleSwitch.addEventListener('change', updateKeyboardButtonBorder);

        document.querySelectorAll('*').forEach(element => {
            element.setAttribute('draggable', 'false');
        });

        // Function to log actions to localStorage
        function logAction(action) {
            const timestamp = new Date().toISOString();
            const logEntry = { action, timestamp };
            
            const log = JSON.parse(localStorage.getItem('ccpcsLog') || '[]');
            log.push(logEntry);
            localStorage.setItem('ccpcsLog', JSON.stringify(log));
            
            // Post message to log.html if it's open in another window/frame
            try {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({type: 'log', message: action}, '*');
                }
                
                // Broadcast to other windows
                window.dispatchEvent(new StorageEvent('storage', {
                    key: 'ccpcsLog',
                    newValue: JSON.stringify(log),
                    storageArea: localStorage
                }));
            } catch (e) {
                console.error("Error posting message:", e);
            }
        }

        // Log when text is spoken
        function speakText(text) {
            if (!text.trim()) return; // Don't speak or log empty text
            
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Cancel any ongoing speech
                const utterance = new SpeechSynthesisUtterance(text);
                
                // Log before starting speech
                logAction(`Keyboard Spoken: "${text}"`);
                
                // Set up event handlers for speech
                utterance.onstart = function() {
                    console.log('Speech started');
                };
                
                utterance.onend = function() {
                    console.log('Speech finished');
                };
                
                utterance.onerror = function(event) {
                    console.log('Speech error occurred');
                    logAction(`Speech Error: ${event.error}`);
                };
                
                window.speechSynthesis.speak(utterance);
            } else {
                console.log('Text-to-speech not supported');
                logAction(`Error: Text-to-speech not supported in this browser`);
                alert('Text-to-speech is not supported in this browser.');
            }
        }

        // Log other button clicks (excluding navigation)
        document.addEventListener('click', function(event) {
            const clickedElement = event.target.closest('.key, .prediction, button');
            
            if (!clickedElement) return;
            
            // Don't log navigation items
            if (clickedElement.classList.contains('nav-item')) {
                return;
            }

            // Log key presses and button clicks
            const textContent = clickedElement.textContent.trim();
            if (textContent) {
                // Handle special keys
                if (clickedElement.classList.contains('key')) {
                    // For keyboard keys
                    logAction(`Keyboard Key Pressed: "${textContent}"`);
                } else if (clickedElement.id === 'speakButton') {
                    // Already handled by speakText
                } else if (clickedElement.classList.contains('prediction')) {
                    // For word predictions
                    logAction(`Prediction Selected: "${textContent}"`);
                } else if (clickedElement.tagName === 'BUTTON') {
                    // Other buttons
                    logAction(`Keyboard Button Clicked: "${textContent}"`);
                }
            }
        });

                want: { es: 'querer', fr: 'vouloir', de: 'wollen', it: 'volere', pt: 'querer', ru: 'хотеть', zh: '想要', ja: '欲しい', ko: '원하다', ar: 'يريد', hi: 'चाहना' },

                // Other common phrases
                good: { es: 'bueno', fr: 'bon', de: 'gut', it: 'buono', pt: 'bom', ru: 'хороший', zh: '好', ja: '良い', ko: '좋은', ar: 'جيد', hi: 'अच्छा' },
                bad: { es: 'malo', fr: 'mauvais', de: 'schlecht', it: 'cattivo', pt: 'ruim', ru: 'плохой', zh: '坏', ja: '悪い', ko: '나쁜', ar: 'سيء', hi: 'बुरा' },

            },

        };

        // Improved function to attempt basic translation between languages
        function translateText(text, fromLang, toLang) {
            if (fromLang === toLang) return text;
            
            // If we don't have translation support for the source language, return original
            if (!translations[fromLang]) {
                console.log(`No translation dictionary for ${fromLang}`);
                return text;
            }
            
            // Split text into words, keeping spaces and punctuation
            const words = text.split(/(\s+|\b)/);
            const translatedWords = words.map(word => {
                // Skip empty strings, spaces, and punctuation
                if (!word.trim() || /^[\s.,!?;:'"()[\]{}]+$/.test(word)) {
                    return word;
                }
                
                // Try to find translation for this word (case insensitive)
                const cleanWord = word.toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "");
                
                // Look for exact match first
                if (translations[fromLang][cleanWord] && translations[fromLang][cleanWord][toLang]) {
                    // Preserve capitalization if possible
                    if (word[0] === word[0].toUpperCase()) {
                        const translated = translations[fromLang][cleanWord][toLang];
                        return translated.charAt(0).toUpperCase() + translated.slice(1);
                    }
                    return translations[fromLang][cleanWord][toLang];
                }
                
                // Try additional lookups for common variants
                // Check for plurals (very simple approach - just remove trailing 's')
                if (cleanWord.endsWith('s') && translations[fromLang][cleanWord.slice(0, -1)]) {
                    const singularForm = cleanWord.slice(0, -1);
                    if (translations[fromLang][singularForm] && translations[fromLang][singularForm][toLang]) {
                        return translations[fromLang][singularForm][toLang];
                    }
                }
                
                // Keep original if no translation found
                return word;
            });
            
            return translatedWords.join('');
        }

        // Fix the language change handler to translate the current text when switching languages
        languageSelect.addEventListener('change', function() {
            // Get the old language for logging
            const oldLanguage = currentLanguage;
            const oldLanguageName = languageSelect.options[languageSelect.selectedIndex].text;
            
            // Store the current text for translation
            const textToTranslate = currentText;
            
            // Update current language
            currentLanguage = this.value;
            
            // Attempt to translate the text to the new language
            if (textToTranslate.trim() !== '') {
                currentText = translateText(textToTranslate, oldLanguage, currentLanguage);
            }
            
            // Update the keyboard layout
            updateKeyboardLayout();
            
            // Update the displayed text with translation
            updateSelectedList();
            
            // Log language change
            logAction(`Language changed from ${oldLanguageName} to ${languageSelect.options[languageSelect.selectedIndex].text}`);
        });

        // Google Cloud Translation API integration
        async function translateWithAPI(text, targetLang) {
          if (!text.trim()) return text;
          const codeMap = {
            en:'en', es:'es', fr:'fr', de:'de', it:'it',
            pt:'pt', ru:'ru', zh:'zh', ja:'ja', ko:'ko',
            ar:'ar', hi:'hi'
          };
          const apiKey = 'AIzaSyAk1F2GOdH4IkDwInXNBvXcbYcSk521mgA';
          const url = `https://translation.googleapis.com/language/translate/v2?key=${apiKey}`;
          const payload = {
            q: text,
            target: codeMap[targetLang] || 'en',
            format: 'text'
          };
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type':'application/json' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error(res.status);
          const data = await res.json();
          return data.data.translations[0].translatedText;
        }

        // Update the dropdown handler to remove 'Translating…' feedback
        languageSelect.addEventListener('change', async function() {
          const target = this.value;          // e.g. "fr", "de", "ja"…
          const original = currentText;       // whatever's in the text buffer

          // translate in the background, no feedback
          currentText = await translateWithAPI(original, target)
                           .catch(_=> original);  // on error, keep original

          // refresh UI
          updateKeyboardLayout();
          updateSelectedList();
        });

        // Add translation cache
        const translationCache = new Map();
        const MAX_CACHE_SIZE = 1000;

        // Function to manage cache size
        function manageCache() {
            if (translationCache.size > MAX_CACHE_SIZE) {
                const keysToDelete = Array.from(translationCache.keys()).slice(0, 100);
                keysToDelete.forEach(key => translationCache.delete(key));
            }
        }

        // Modify the language change handler to use the improved translation
        languageSelect.addEventListener('change', async function() {
            const oldLanguage = currentLanguage;
            const oldLanguageName = languageSelect.options[languageSelect.selectedIndex].text;
            const textToTranslate = currentText;
            
            // Update current language
            currentLanguage = this.value;
            
            // Attempt to translate the text using the API
            if (textToTranslate.trim() !== '') {
                try {
                    // Show loading state
                    selectedList.innerHTML = `<div class=\"selected-item\"> </div>`;
                    
                    // Get the translation
                    const translatedText = await translateWithAPI(textToTranslate, oldLanguage);
                    currentText = translatedText;
                    
                    // Manage cache size
                    manageCache();
                    
                    // Update the keyboard layout
                    updateKeyboardLayout();
                    
                    // Update the displayed text with translation
                    updateSelectedList();
                    
                    // Log language change
                    logAction(`Language changed from ${oldLanguageName} to ${languageSelect.options[languageSelect.selectedIndex].text}`);
                } catch (error) {
                    console.error('Translation failed:', error);
                    // Show error state
                    selectedList.innerHTML = `<div class=\"selected-item\">Translation failed. Keeping original text.</div>`;
                    setTimeout(() => updateSelectedList(), 2000);
                }
            } else {
                // If no text to translate, just update the keyboard layout
                updateKeyboardLayout();
            }
        });

        // Add debug logging for language changes
        languageSelect.addEventListener('change', function() {
            console.log('Language changed to:', this.value);
            console.log('Current text:', currentText);
        });

        // Helper function to translate navigation bar items
        async function translateNavBar(targetLang) {
            const navItems = document.querySelectorAll('.navigation .nav-item');
            for (const item of navItems) {
                const original = item.getAttribute('data-original') || item.textContent;
                item.setAttribute('data-original', original);
                // Use the same API as translateWithAPI
                try {
                    const translated = await translateWithAPI(original, targetLang);
                    item.textContent = translated;
                } catch (e) {
                    item.textContent = original;
                }
            }
        }

        // Update navigation bar translation on language change
        languageSelect.addEventListener('change', async function() {
            await translateNavBar(this.value);
        });

        // On page load, translate nav bar if language is not English
        window.addEventListener('DOMContentLoaded', async function() {
            const lang = localStorage.getItem('keyboardLanguage') || 'en';
            if (lang !== 'en') {
                await translateNavBar(lang);
            }
        });
    </script>
