<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxEasy - Keyboard</title>
    <style>
        /* Disable dragging for all elements */
        * {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap');

        :root {
            /* Updated color variables for Vision Pro style */
            --bg-color: rgba(255, 255, 255, 0.18);
            --text-color: #333333;
            --item-bg: rgba(255, 255, 255, 0.15);
            --item-border: rgba(255, 255, 255, 0.2);
            --item-hover: rgba(255, 255, 255, 0.25);
            --item-selected: rgba(51, 51, 51, 0.15);
            --shadow-light: rgba(255, 255, 255, 0.5);
            --shadow-dark: rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #cfeaff 0%, #f3f3f4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: var(--text-color);
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            transition: all 0.3s ease;
        }

        .container {
            background: var(--bg-color);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 18px;
            padding: 40px;
            box-shadow: 
                0 8px 24px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
            max-width: 3000px;
            width: 100%;
            max-height: 900px;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--item-border);
            animation: containerFadeIn 0.5s ease-out;
            overflow: visible;
        }

        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 6px;
            margin-top: 15px;
            padding: 10px;
        }

        .key {
            background: var(--item-bg);
            border: 1px solid var(--item-border);
            border-radius: 12px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 30px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 
                0 4px 6px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .key:hover {
            background: var(--item-hover);
            transform: translateY(-2px);
            box-shadow: 
                0 8px 16px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .key:active {
            transform: translateY(0);
            box-shadow: 
                0 4px 8px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .selected-choices {
            background: var(--item-bg);
            border: 1px solid var(--item-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            flex-grow: 0;
            display: flex;
            flex-direction: column;
            min-height: 80px;
            max-height: 100px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 
                0 4px 12px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .selected-item {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--item-border);
            border-radius: 15px;
            padding: 10px 15px;
            font-size: 1.3em;
            line-height: 1.2;
            min-height: 1.2em;
            position: relative;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .speak-button {
            background: #333333;
            color: #ffffff;
            border: none;
            padding: 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.6em;
            transition: all 0.3s ease;
            margin-top: 15px;
            text-align: center;
            box-shadow: 
                0 4px 6px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .speak-button:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 16px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .speak-button:active {
            transform: translateY(0);
            box-shadow: 
                0 4px 8px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .dark-mode .speak-button {
            background: #ffffff;
            color: #333333;
        }

        .prediction {
            background: var(--item-bg);
            border: 1px solid var(--item-border);
            border-radius: 12px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            margin: 0 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
            font-size: 0.9em;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 
                0 4px 6px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .prediction:hover {
            background: var(--item-hover);
            transform: translateY(-2px);
            box-shadow: 
                0 8px 16px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .prediction:active {
            transform: translateY(0);
            box-shadow: 
                0 4px 8px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .nav-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            padding: 12px 24px;
            margin: 0 5px;
            text-decoration: none;
            color: var(--text-color);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.15),
                inset 0 0 0 1px rgba(255, 255, 255, 0.15),
                inset 0 0 0 2px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .nav-item:active {
            transform: translateY(0);
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item[href="keyboard.html"] {
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 
                0 16px 48px rgba(0, 0, 0, 0.2),
                inset 0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 0 0 2px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark-mode {
            --bg-color: rgba(0, 0, 0, 0.18);
            --text-color: #ffffff;
            --item-bg: rgba(255, 255, 255, 0.1);
            --item-border: rgba(255, 255, 255, 0.1);
            --item-hover: rgba(255, 255, 255, 0.15);
            --item-selected: rgba(255, 255, 255, 0.2);
            --shadow-light: rgba(255, 255, 255, 0.1);
            --shadow-dark: rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2e 100%);
        }

        .dark-mode .container {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .dark-mode .nav-item {
            background: rgba(0, 0, 0, 0.05);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.2),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 0 0 2px rgba(255, 255, 255, 0.02);
        }

        .dark-mode .nav-item:hover {
            background: rgba(0, 0, 0, 0.08);
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.25),
                inset 0 0 0 1px rgba(255, 255, 255, 0.08),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .dark-mode .nav-item:active {
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.15),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 0 0 2px rgba(255, 255, 255, 0.02);
        }

        .dark-mode .nav-item[href="keyboard.html"] {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 16px 48px rgba(0, 0, 0, 0.3),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .navigation {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--item-border);
            text-align: center;
            width: 100%; /* Make the line span the entire width */
        }

        .nav-item {
            padding: 10px 20px;
            margin: 0 5px;
            text-decoration: none;
            color: var(--text-color);
            background-color: var(--item-bg);
            border-radius: 20px;
            transition: background-color 0s;
            text-align: center;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 500;
            font-size: 2.5em;
            color: var(--text-color);
        }

        .key.wide {
            grid-column: span 2;
            font-size: 1.5em;
            font-weight: 500;
        }

        .selected-list {
            flex-grow: 1;
            display: flex;
            align-items: flex-end;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: var(--text-color);
            margin-left: 1px;
            animation: blink 0.7s infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .bottom-buttons {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .back-button {
            background: var(--item-bg);
            border: 1px solid var(--item-border);
            color: var(--text-color);
            padding: 15px 30px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0s ease;
            text-decoration: none;
            display: inline-block;
        }

        .back-button:hover {
            background: var(--item-hover);
        }

        .backspace-icon {
            width: 38px;
            height: 38px;
            display: block;
            margin: 0 auto;
        }

        .shift-icon {
            width: 32px;
            height: 32px;
            display: block;
            margin: 0 auto;
        }

        #shift.active .shift-icon {
            filter: brightness(0) invert(1);
        }

        #shift.active {
            background-color: var(--text-color);
        }

        .prediction-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            height: 35px;
        }

        .toggle-switch {
            margin-bottom: 20px;
        }

        .toggle-input {
            display: none;
        }

        .toggle-label {
            display: inline-block;
            width: 60px;
            height: 34px;
            background-color: var(--text-color);
            border-radius: 34px;
            position: relative;
            cursor: pointer;
            transition: background-color 0s;
        }

        .toggle-label:before {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            top: 4px;
            left: 4px;
            background-color: var(--bg-color);
            transition: 0s;
        }

        .toggle-input:checked + .toggle-label {
            background-color: #ccc;
        }

        .toggle-input:checked + .toggle-label:before {
            transform: translateX(26px);
            background-color: var(--text-color);
        }

        #backspace img.backspace-icon {
            filter: brightness(0); /* Default to black in light mode */
        }
    </style>
</head>

                }
            });

        function updatePredictions() {
            const words = currentText.split(' ');
            const currentWord = words[words.length - 1].toLowerCase();
           
            let predictions = [];
            if (currentWord.length > 0) {
                predictions = commonWords
                    .filter(word => word.toLowerCase().startsWith(currentWord))
                    .slice(0, 3);
            }
           
            const predictionElements = predictionBar.querySelectorAll('.prediction');
           
            predictionElements.forEach((elem, index) => {
                if (index < predictions.length) {
                    const word = isUpperCase ? predictions[index].toUpperCase() : predictions[index].toLowerCase();
                    elem.textContent = word;
                    elem.onclick = () => {
                        words[words.length - 1] = word;
                        currentText = words.join(' ') + ' ';
                        updateSelectedList();
                    };
                } else {
                    elem.textContent = '';
                    elem.onclick = null;
                }
            });
        }


        // Initial call to set up prediction boxes
        updatePredictions();


        function updateSelectedList() {
            let words = currentText.split(' ');
            let lastWord = words[words.length - 1];
            let correctedWord = autocorrect(lastWord);
           
            if (correctedWord.toLowerCase() !== lastWord.toLowerCase()) {
                words[words.length - 1] = correctedWord;
                currentText = words.join(' ') + ' '; // Add space after autocorrection
            }


            // Apply the current case to the entire text
            currentText = isUpperCase ? currentText.toUpperCase() : currentText.toLowerCase();


            const textWithCursor = currentText + '<span class="cursor"></span>';
            selectedList.innerHTML = `<div class="selected-item">${textWithCursor}</div>`;
            updatePredictions();
        }


        // Modify the key click event listener
        document.querySelectorAll('.keyboard .key').forEach(key => {
            key.addEventListener('click', () => {
                if (key.id === 'switchToNumbers' || key.id === 'switchToAlphabet') {
                    return; // Do nothing for these keys
                }
                console.log('Key clicked:', key.id || key.textContent);
                if (key.textContent === 'SPACE' || key.textContent === 'Space') {
                    currentText += ' ';
                    updateSelectedList(); // Apply autocorrect when space is pressed
                } else if (key.id === 'backspace') {
                    currentText = currentText.slice(0, -1);
                } else if (key.textContent === 'CLEAR' || key.textContent === 'Clear') {
                    currentText = '';
                } else if (key.id === 'toggleCase') {
                    // Do nothing, handled by separate event listener
                } else {
                    currentText += key.textContent;
                }
                updateSelectedList();
            });
        });


        speakButton.addEventListener('click', () => {
            console.log('Speak button clicked');
            if (isSpeaking) {
                stopSpeaking();
            } else {
                speak(currentText);
            }
        });


        // Initial update of the selected list
        updateSelectedList();


        function speak(text) {
            if ('speechSynthesis' in window) {
                stopSpeaking();
               
                const utterance = new SpeechSynthesisUtterance(text);
               
                utterance.onstart = () => {
                    console.log('Speech started');
                    isSpeaking = true;
                    speakButton.textContent = 'SPEAK';
                };


                utterance.onend = () => {
                    console.log('Speech finished');
                    resetSpeakButton();
                    addToLog(`Spoken: ${text}`); // Log only the spoken text here
                };


                utterance.onerror = () => {
                    console.log('Speech error occurred');
                    resetSpeakButton();
                };


                speechSynthesis.speak(utterance);
            } else {
                console.log('Text-to-speech not supported in this browser');
            }
        }


        function stopSpeaking() {
            speechSynthesis.cancel();
            resetSpeakButton();
        }


        function resetSpeakButton() {
            isSpeaking = false;
            speakButton.textContent = 'SPEAK';
        }


        function addToLog(message) {
            // Retrieve existing logs or initialize an empty array
            let logs = JSON.parse(localStorage.getItem('ccpcsLog')) || []
            // Add the new message to the logs
            logs.push({ action: message, timestamp: new Date().toISOString() })
            // Store the updated logs back in local storage
            localStorage.setItem('ccpcsLog', JSON.stringify(logs))
            console.log('Logged:', message)
        }


        const toggleSwitch = document.getElementById('switch');
        const body = document.body;
        const container = document.querySelector('.container');
        
        // Check the initial state from local storage
        if (localStorage.getItem('darkMode') === 'enabled') {
            body.classList.add('dark-mode');
            toggleSwitch.checked = true;
            updateIconColors('white');
        }

        toggleSwitch.addEventListener('change', function() {
            if (this.checked) {
                console.log('Switch is ON - Dark Mode');
                body.classList.add('dark-mode');
                localStorage.setItem('darkMode', 'enabled');
                updateIconColors('white'); // Set icons to white
            } else {
                console.log('Switch is OFF - Light Mode');
                body.classList.remove('dark-mode');
                localStorage.setItem('darkMode', 'disabled');
                updateIconColors('black'); // Set icons to black
            }
        });

        function updateIconColors(color) {
            const backspaceIcons = document.querySelectorAll('.backspace-icon');
            backspaceIcons.forEach(icon => {
                if (icon) {
                    // Update the filter to change the icon color
                    icon.style.filter = color === 'white' ? 'brightness(0) invert(1)' : 'brightness(0)';
                }
            });
        }

        const keyboardButton = document.querySelector('.nav-item[href="keyboard.html"]');

        function updateKeyboardButtonBorder() {
            if (body.classList.contains('dark-mode')) {
                keyboardButton.style.border = '0px solid white';
            } else {
                keyboardButton.style.border = '0px solid black';
            }
        }

        // Call the function initially to set the correct border color
        updateKeyboardButtonBorder();

        // Update the border color whenever the mode changes
        toggleSwitch.addEventListener('change', updateKeyboardButtonBorder);

        // Make all elements undraggable
        document.querySelectorAll('*').forEach(element => {
            element.setAttribute('draggable', 'false');
        });

        // Function to log actions to localStorage
        function logAction(action) {
            const timestamp = new Date().toISOString();
            const logEntry = { action, timestamp };
            
            const log = JSON.parse(localStorage.getItem('ccpcsLog') || '[]');
            log.push(logEntry);
            localStorage.setItem('ccpcsLog', JSON.stringify(log));
            
            // Post message to log.html if it's open in another window/frame
            try {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({type: 'log', message: action}, '*');
                }
                
                // Broadcast to other windows
                window.dispatchEvent(new StorageEvent('storage', {
                    key: 'ccpcsLog',
                    newValue: JSON.stringify(log),
                    storageArea: localStorage
                }));
            } catch (e) {
                console.error("Error posting message:", e);
            }
        }

        // Log when text is spoken
        function speakText(text) {
            if (!text.trim()) return; // Don't speak or log empty text
            
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Cancel any ongoing speech
                const utterance = new SpeechSynthesisUtterance(text);
                
                // Log before starting speech
                logAction(`Keyboard Spoken: "${text}"`);
                
                // Set up event handlers for speech
                utterance.onstart = function() {
                    console.log('Speech started');
                };
                
                utterance.onend = function() {
                    console.log('Speech finished');
                };
                
                utterance.onerror = function(event) {
                    console.log('Speech error occurred');
                    logAction(`Speech Error: ${event.error}`);
                };
                
                window.speechSynthesis.speak(utterance);
            } else {
                console.log('Text-to-speech not supported');
                logAction(`Error: Text-to-speech not supported in this browser`);
                alert('Text-to-speech is not supported in this browser.');
            }
        }

        // Log other button clicks (excluding navigation)
        document.addEventListener('click', function(event) {
            const clickedElement = event.target.closest('.key, .prediction, button');
            
            if (!clickedElement) return;
            
            // Don't log navigation items
            if (clickedElement.classList.contains('nav-item')) {
                return;
            }

            // Log key presses and button clicks
            const textContent = clickedElement.textContent.trim();
            if (textContent) {
                // Handle special keys
                if (clickedElement.classList.contains('key')) {
                    // For keyboard keys
                    logAction(`Keyboard Key Pressed: "${textContent}"`);
                } else if (clickedElement.id === 'speakButton') {
                    // Already handled by speakText
                } else if (clickedElement.classList.contains('prediction')) {
                    // For word predictions
                    logAction(`Prediction Selected: "${textContent}"`);
                } else if (clickedElement.tagName === 'BUTTON') {
                    // Other buttons
                    logAction(`Keyboard Button Clicked: "${textContent}"`);
                }
            }
        });

        // Add event listeners once DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            // Get necessary elements
            const inputField = document.querySelector('textarea, input[type="text"]'); // Adjust selector based on your input element
            const speakButton = document.querySelector('button#speakButton'); // Adjust selector based on your speak button

            // Log when speak button is clicked
            if (speakButton) {
                speakButton.addEventListener('click', function() {
                    const text = inputField.value.trim();
                    if (text) {
                        speakText(text);
                    }
                });
            }

            // Log when Enter key is pressed (if you want to support this)
            if (inputField) {
                inputField.addEventListener('keypress', function(event) {
                    if (event.key === 'Enter' && !event.shiftKey) {
                        event.preventDefault();
                        const text = this.value.trim();
                        if (text) {
                            speakText(text);
                        }
                    }
                });
            }

            // Handle dark mode
            const toggleSwitch = document.getElementById('switch');
            const body = document.body;

            if (localStorage.getItem('darkMode') === 'enabled') {
                body.classList.add('dark-mode');
                toggleSwitch.checked = true;
            }

            toggleSwitch.addEventListener('change', function() {
                if (this.checked) {
                    body.classList.add('dark-mode');
                    localStorage.setItem('darkMode', 'enabled');
                } else {
                    body.classList.remove('dark-mode');
                    localStorage.setItem('darkMode', 'disabled');
                }
            });

            // Display patient name if available
            const currentPatient = JSON.parse(localStorage.getItem('currentPatient'));
            if (currentPatient) {
                const patientNameElement = document.getElementById('patient-name');
                if (patientNameElement) {
                    patientNameElement.textContent = `${currentPatient.firstName} ${currentPatient.lastName}`;
                }
            }
        });
