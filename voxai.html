<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxEasy - VoxAI</title>
    <style>
        /* Disable dragging for all elements */
        * {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }


        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap');


        :root {
            /* Updated color variables for Vision Pro style */
            --bg-color: rgba(255, 255, 255, 0.18);
            --text-color: #333333;
            --item-bg: rgba(255, 255, 255, 0.15);
            --item-border: rgba(255, 255, 255, 0.2);
            --item-hover: rgba(255, 255, 255, 0.25);
            --item-selected: rgba(51, 51, 51, 0.15);
            --shadow-light: rgba(255, 255, 255, 0.5);
            --shadow-dark: rgba(0, 0, 0, 0.15);
        }


        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #cfeaff 0%, #f3f3f4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: var(--text-color);
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            transition: all 0.3s ease;
        }


        .container {
            background: var(--bg-color);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 20px;
            padding: 45px;
            box-shadow: 
                0 8px 24px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
            max-width: 1000px;
            width: 100%;
            position: relative;
            padding-top: 45px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            max-height: 2200px;
            min-height: 700px;
            height: 100%;
            border: 1px solid var(--item-border);
            animation: containerFadeIn 0.5s ease-out;
            overflow: visible;
        }


        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }


        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 500;
            font-size: 2.5em;
            color: var(--text-color);
        }


        .choice-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding-top: 12px;
            position: relative;
            z-index: 0;
        }


        .choice-item {
            background: var(--item-bg);
            border: 1px solid var(--item-border);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 
                0 4px 6px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
            position: relative;
            z-index: 1;
        }


        .choice-item:hover {
            /* Remove all hover styles */
        }


        .choice-item:active {
            transform: translateY(0);
            background: var(--item-bg);
        }


        .choice-item.selected {
            transform: translateY(-4px);
            box-shadow: 
                0 8px 16px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
            background: var(--item-hover);
            border-color: var(--item-border);
            z-index: 2;
        }


        .choice-item.selected:active {
            transform: translateY(-4px);
            box-shadow: 
                0 4px 8px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }


        .choice-item img {
            width: 70px;
            height: 70px;
            margin-bottom: 12px;
            transition: all 0s ease;
        }


        .choice-item p {
            margin: 0;
            font-weight: 400;
            font-size: 1.4em;
            color: var(--text-color);
        }


        .selected-choices {
            background: var(--item-bg);
            border: 1px solid var(--item-border);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            text-align: center; /* Center the text horizontally */
            box-shadow: 
                0 4px 12px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }


        .selected-choices h2 {
            margin-top: 0;
            font-weight: 500;
            color: var(--text-color);
            font-size: 1.3em; /* Adjust the font size to be smaller */
            cursor: pointer;
        }


        .selected-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 40px; /* Ensure there's always space for at least one item */
        }


        .selected-item {
            background: var(--bg-color);
            border: 1px solid var(--item-border);
            border-radius: 20px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }


        .speak-button {
            background: var(--text-color);
            border: none;
            color: var(--bg-color);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 20px;
            transition: all 0s ease;
        }


        .speak-button:hover {
            opacity: 0.8;
        }


        @media (max-width: 600px) {
            .choice-board {
                grid-template-columns: repeat(2, 1fr);
            }
        }


        .voice-selector {
            margin-bottom: 20px;
            text-align: center;
        }
        select {
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid var(--item-border);
            background-color: var(--item-bg);
            color: var(--text-color);
        }


        .choice-item a {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }


        .view-log-container {
            text-align: center;
            margin-top: 20px;
        }


        .view-log-button {
            --bg-color: #ffffff;
            --text-color: #000000;
            --item-bg: #f5f5f7;
            --item-border: #d2d2d7;
            --item-hover: #e8e8ed;
            --item-selected: rgba(0, 0, 0, 0.1);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0s;
        }


        .navigation {
            display: flex;
            justify-content: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid var(--item-border);
        }


        .nav-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            padding: 12px 25px;
            margin: 0 6px;
            text-decoration: none;
            color: var(--text-color);
            border-radius: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            font-size: 1em;
        }


        .nav-item:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.15),
                inset 0 0 0 1px rgba(255, 255, 255, 0.15),
                inset 0 0 0 2px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }


        /* Active state for VoxAI page */
        .nav-item[href="voxai.html"] {
            background: rgba(255, 255, 255, 0.12) !important;
            box-shadow: 
                0 16px 48px rgba(0, 0, 0, 0.2),
                inset 0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 0 0 2px rgba(255, 255, 255, 0.1) !important;
            transform: translateY(-2px) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
        }


        /* Remove any other specific nav-item styles */
        .nav-item[href="pic.html"],
        .nav-item[href="prompts.html"],
        .nav-item[href="pain.html"],
        .nav-item[href="keyboard.html"],
        .nav-item[href="documents.html"],
        .nav-item[href="mood.html"] {
            background: rgba(255, 255, 255, 0.05) !important;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05) !important;
            transform: none !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }


        .dark-mode {
            --bg-color: rgba(0, 0, 0, 0.18);
            --text-color: #ffffff;
            --item-bg: rgba(255, 255, 255, 0.1);
            --item-border: rgba(255, 255, 255, 0.1);
            --item-hover: rgba(255, 255, 255, 0.15);
            --item-selected: rgba(255, 255, 255, 0.2);
            --shadow-light: rgba(255, 255, 255, 0.1);
            --shadow-dark: rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2e 100%);
        }


        .dark-mode .container {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }


        .dark-mode .nav-item {
            background: rgba(0, 0, 0, 0.05);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.2),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 0 0 2px rgba(255, 255, 255, 0.02);
        }


        .dark-mode .nav-item:hover {
            background: rgba(0, 0, 0, 0.08);
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.25),
                inset 0 0 0 1px rgba(255, 255, 255, 0.08),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
        }


        .dark-mode .nav-item:active {
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.15),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 0 0 2px rgba(255, 255, 255, 0.02);
        }


        .dark-mode .nav-item[href="pic.html"] {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 16px 48px rgba(0, 0, 0, 0.3),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
        }


        .dark-mode .nav-item[href="pic.html"]::before {
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.1),
                rgba(255, 255, 255, 0.05)
            );
        }


        .logout-button {
            background-color: rgba(255, 59, 48, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            box-shadow: 
                0 4px 6px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }


        .logout-button:hover {
            /* Remove all hover styles */
        }


        .logout-button:active {
            transform: translateY(0);
            background-color: rgba(255, 59, 48, 0.7);
        }


        .navigation-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .slide-indicators {
            display: flex;
            justify-content: center;
            margin: 0 20px; /* Add horizontal space between buttons and dots */
        }


        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center; /* Keep buttons vertically centered */
        }


        .choice-item img[alt="Blanket"] {
            width: 72px;  /* Slightly larger than the default 60px */
            height: 72px; /* Slightly larger than the default 60px */
        }

        .toggle-switch {
            position: absolute;
            top: 45px;
            left: 45px;
        }

        .toggle-input {
            display: none;
        }

        .toggle-label {
            display: inline-block;
            width: 60px;
            height: 34px;
            background-color: var(--text-color);
            border-radius: 34px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .toggle-label:before {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            top: 4px;
            left: 4px;
            background-color: var(--bg-color);
            transition: 0.3s ease;
        }

        .toggle-input:checked + .toggle-label {
            background-color: #ccc;
        }

        .toggle-input:checked + .toggle-label:before {
            transform: translateX(26px);
            background-color: var(--text-color);
        }

        .top-right-container {
            position: absolute;
            top: 45px;
            right: 45px;
            font-size: 1.2em;
            color: var(--text-color);
        }

        .slide-container {
            display: flex;
            overflow: hidden;
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        .slide {
            min-width: 100%;
            transition: transform 0.3s ease;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .nav-button {
            background: var(--item-bg);
            border: 1px solid var(--item-border);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow:

                inset 0 1px 1px var(--shadow-light);
        }

        .nav-button:hover {
            /* Remove all hover styles */
        }

        .nav-button:active {
            transform: translateY(0);
            background: var(--item-bg);
        }

        .slide-indicators {
            display: flex;
            justify-content: center;
            margin: 0 20px;
        }

        .dot {
            height: 8px;
            width: 8px;
            margin: 0 5px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            display: inline-block;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .dot.active {
            background-color: rgba(0, 0, 0, 0.5);
            transform: scale(1.2);
        }

        .dark-mode .dot {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .dark-mode .dot.active {
            background-color: rgba(255, 255, 255, 0.5);
        }

        #clearSelectedChoices {
            cursor: pointer;
            font-size: 1.3em;
            color: var(--text-color);
            margin: 0;
        }

        #clearSelectedChoices:hover {
            text-decoration: none;
        }

        .placeholder {
            color: var(--item-border);
            font-style: italic;
            justify-content: center;
            width: 100%;
        }

        .logout-container {
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        /* ChatAI Companion Styles */
        .chat-container {
            background: var(--item-bg);
            border: 1px solid var(--item-border);
            border-radius: 18px;
            padding: 25px;
            margin-top: 90px;
            box-shadow: 
                0 4px 12px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            max-height: 550px;
            min-height: 550px;
            height: 550px;
            display: flex;
            flex-direction: column;
        }

        .chat-container h2 {
            margin-top: 0;
            font-weight: 500;
            color: var(--text-color);
            font-size: 1.3em;
            text-align: center;
            margin-bottom: 15px;
        }

        .chat-history {
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            height: 400px;

        .chat-message {

            margin-top: 4px;

            padding: 0 8px;

        .chat-input-container {

            margin-top: auto;

        #chatInput {

            border-radius: 50%;

        }

        #sendButton img {

            height: 20px;

        .dark-mode .chat-message.user .message-bubble {
            background-color: #0a84ff;
        }

        .dark-mode #sendButton img {
            filter: invert(1);
        }
        
        /* For dark mode, ensure chat text is readable */
        .dark-mode .chat-message.ai .message-bubble {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border-color: rgba(255, 255, 255, 0.15);
        }

        }

        /* Remove extra spacing after the br tags */
        br {

<body>
    <div class="container">
        <!-- Add the logout button here -->
        <div class="logout-container">
            <button class="logout-button" onclick="window.location.href='index.html'">Logout</button>
        </div>

        <!-- Add the toggle switch here -->
        <div class="toggle-switch">
            <input type="checkbox" id="switch" class="toggle-input" />
            <label for="switch" class="toggle-label"></label>
        </div>

        <!-- Patient's name displayed in the top right -->
        <div class="top-right-container">
            <span id="patient-name"></span>
        </div>

        <br>
        <br>

        <!-- ChatAI Companion Interface -->
        <div class="chat-container">
            <h2>Vox AI</h2>
            <iframe
                src="https://www.chatbase.co/chatbot-iframe/g-fQhTE27L-7ohFzSyK5J"
                width="100%"
                style="height: 100%; min-height: 400px; border-radius: 10px;"
                frameborder="0"
            ></iframe>
        </div>

        <!-- Add the navigation bar at the bottom -->
        <nav class="navigation">
            <a href="pic.html" class="nav-item">Picture Board</a>   
            <a href="prompts.html" class="nav-item">Prompts</a>         
            <a href="pain.html" class="nav-item">Pain</a>
            <a href="keyboard.html" class="nav-item">Keyboard</a>
            <a href="voxai.html" class="nav-item">VoxAI</a>
            <!-- New navigation items -->
            <a href="documents.html" class="nav-item">Documents</a>
            <a href="mood.html" class="nav-item">Mood</a>
        </nav>
    </div>

    <script>
        const choiceItems = document.querySelectorAll('.choice-item');
        const selectedList = document.getElementById('selectedList');
        const selectedChoices = new Set();
        const talkButton = document.getElementById('talkButton');
        const toggleSwitch = document.getElementById('switch');
        const body = document.body;

        // Check the initial state from local storage
        if (localStorage.getItem('darkMode') === 'enabled') {
            body.classList.add('dark-mode');
            toggleSwitch.checked = true;
            updateIconColors('white');
        }

        toggleSwitch.addEventListener('change', function() {
            if (this.checked) {
                console.log('Switch is ON - Dark Mode');
                body.classList.add('dark-mode');
                localStorage.setItem('darkMode', 'enabled');
                updateIconColors('white');
                updateSendIconColor();
            } else {
                console.log('Switch is OFF - Light Mode');
                body.classList.remove('dark-mode');
                localStorage.setItem('darkMode', 'disabled');
                updateIconColors('black');
                updateSendIconColor();
            }
        });

        function updateIconColors(color) {
            const icons = document.querySelectorAll('.choice-item img');
            icons.forEach(icon => {
                const currentSrc = icon.src;
                const newSrc = currentSrc.replace(/color=[^&]+/, `color=${color}`);
                icon.src = newSrc;
            });
        }

        function speak(text) {
            console.log('Speaking:', text);
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                window.speechSynthesis.speak(utterance);
            } else {
                console.log('Text-to-speech is not supported in this browser.');
                alert('Text-to-speech is not supported in this browser.');
            }
        }

        function updateSelectedList() {
            console.log('Updating selected list');
            selectedList.innerHTML = '';
            if (selectedChoices.size === 0) {
                // Show placeholder if no choices are selected
                const placeholder = document.createElement('div');
                placeholder.id = 'placeholder';
                placeholder.classList.add('selected-item', 'placeholder');
                placeholder.textContent = 'No choices selected';
                selectedList.appendChild(placeholder);
            } else {
                selectedChoices.forEach(choice => {
                    const choiceElement = document.createElement('div');
                    choiceElement.classList.add('selected-item');
                    choiceElement.dataset.choice = choice; // Store choice text as data attribute
                    const img = document.querySelector(`.choice-item img[alt="${choice}"]`).cloneNode(true);
                    choiceElement.appendChild(img);
                    choiceElement.appendChild(document.createTextNode(choice));
                    
                    // Add click event listener to remove the choice when clicked
                    choiceElement.addEventListener('click', function() {
                        const choiceText = this.dataset.choice;
                        console.log('Selected choice clicked:', choiceText);
                        
                        // Remove from selectedChoices set
                        selectedChoices.delete(choiceText);
                        
                        // Find and unselect the corresponding choice-item in the board
                        const allChoiceItems = document.querySelectorAll('.choice-item');
                        allChoiceItems.forEach(item => {
                            const itemText = item.querySelector('p').textContent;
                            if (itemText === choiceText) {
                                item.classList.remove('selected');
                            }
                        });
                        
                        // Update the display
                        updateSelectedList();
                    });
                    
                    selectedList.appendChild(choiceElement);
                });
            }

            // Save selected choices to local storage
            localStorage.setItem('selectedChoices', JSON.stringify(Array.from(selectedChoices)));
        }

        talkButton.addEventListener('click', (event) => {
            event.preventDefault();
            window.location.href = 'keyboard.html';
        });

        choiceItems.forEach(item => {
            item.addEventListener('click', (event) => {
                if (item.id !== 'talkButton') {
                    event.preventDefault();
                    const text = item.querySelector('p').textContent;
                    console.log('Choice clicked:', text);

                    if (selectedChoices.has(text)) {
                        selectedChoices.delete(text);
                        item.classList.remove('selected');
                    } else {
                        selectedChoices.add(text);
                        item.classList.add('selected');
                        speak(text);
                        
                        // Log the choice to ccpcsLog
                        const timestamp = new Date().toISOString();
                        const logEntry = { 
                            action: `Pic Choice Spoken: "${text}"`, 
                            timestamp 
                        };
                        const log = JSON.parse(localStorage.getItem('ccpcsLog') || '[]');
                        log.push(logEntry);
                        localStorage.setItem('ccpcsLog', JSON.stringify(log));
                    }

                    updateSelectedList();
                }
            });
        });

        document.addEventListener('click', function(event) {
            const clickedElement = event.target;
            
            // Don't log navigation items or choice items (they're handled separately)
            if (clickedElement.classList.contains('nav-item') || 
                clickedElement.closest('.choice-item') || 
                clickedElement.id === 'clearSelectedChoices' ||
                clickedElement.classList.contains('nav-button') ||
                clickedElement.classList.contains('dot')) {
                return;
            }

            // Log other clicks
            const textContent = clickedElement.textContent.trim();
            if (textContent) {  // Only log if there's actual text content
                const timestamp = new Date().toISOString();
                const logEntry = { 
                    action: `Button Clicked: "${textContent}"`, 
                    timestamp 
                };
                
                const log = JSON.parse(localStorage.getItem('ccpcsLog') || '[]');
                log.push(logEntry);
                localStorage.setItem('ccpcsLog', JSON.stringify(log));
            }
        });
    </script>

    <script>
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        let currentSlide = 0;

        // Only add event listeners if elements exist
        const nextSlideButton = document.getElementById('nextSlide');
        const prevSlideButton = document.getElementById('prevSlide');

        if (nextSlideButton) {
            nextSlideButton.addEventListener('click', () => {
            // Update to allow circular navigation
            currentSlide = (currentSlide + 1) % slides.length;
            updateSlidePosition();
        });
        }

        if (prevSlideButton) {
            prevSlideButton.addEventListener('click', () => {
            // Update to allow circular navigation
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            updateSlidePosition();
        });
        }

        function updateSlidePosition() {
            slides.forEach((slide, index) => {
                slide.style.transform = `translateX(-${currentSlide * 100}%)`;
            });
            updateDots();
        }

        function updateDots() {
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentSlide);
            });
        }

        // Initialize the first dot as active only if dots exist
        if (dots.length > 0) {
        updateDots();
        }
    </script>

            // Simple message display function
            function addMessageToChat(text, isUser) {
            const messageDiv = document.createElement('div');

                const bubbleDiv = document.createElement('div');

                messageDiv.appendChild(bubbleDiv);

                // Log to ccpcsLog
            const log = JSON.parse(localStorage.getItem('ccpcsLog') || '[]');

                    timestamp: new Date().toISOString()

            function removeTypingIndicator() {
                const indicator = document.getElementById('typing-indicator');
                if (indicator) indicator.remove();
            }
            
            // Fallback responses if API fails
            const fallbackResponses = [
                "I'm here to help you. What would you like to talk about?",
                "I understand this may be a difficult time. How are you feeling today?",
                "I'd like to know more about how you're doing. Can you tell me more?",
                "Is there anything specific on your mind today that you'd like to discuss?"
            ];
            
            function getRandomFallbackResponse() {
                return fallbackResponses[Math.floor(Math.random() * fallbackResponses.length)];
            }
            
            // Simplified sendMessage function
            async function sendMessage() {
                const userText = chatInput.value.trim();
                if (!userText) return;
                
                // Display user message
                addMessageToChat(userText, true);
                chatInput.value = '';
                
                // Show typing indicator
                showTypingIndicator();
                
                try {
                    // Create a basic fetch request to OpenAI API
                    const response = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${API_KEY}`
                        },
                        body: JSON.stringify({
                            model: 'gpt-3.5-turbo',
                            messages: [
                                {role: 'system', content: 'You are VoxAI, a friendly and supportive AI companion for patients in healthcare settings.'},
                                {role: 'user', content: userText}
                            ]
                        })
                    });
                    
                    // Log response for debugging
                    console.log('API Response Status:', response.status);
                    
                    if (response.ok) {
                        const data = await response.json();
                        console.log('API Data:', data);
                        
                        if (data.choices && data.choices[0] && data.choices[0].message) {
                            removeTypingIndicator();
                            addMessageToChat(data.choices[0].message.content.trim(), false);
                        } else {
                            throw new Error('Invalid response format');
                        }
                            } else {
                        const errorText = await response.text();
                        console.error('API Error:', response.status, errorText);
                        throw new Error(`API Error: ${response.status}`);
                    }
                } catch (error) {
                    console.error('Error:', error);
                    removeTypingIndicator();
                    
                    // Use fallback response
                    addMessageToChat(getRandomFallbackResponse(), false);
                }
            }
            
            // Event listeners - only add if elements exist
            sendButton.addEventListener('click', sendMessage);
            chatInput.addEventListener('keypress', e => {
                if (e.key === 'Enter') sendMessage();
            });

                    }
                }
            }
            
            // Initialize
            updateSendIconColor();
        } else {

        }
