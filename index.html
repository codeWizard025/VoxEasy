<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Meta tags and title -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxEasy - Home</title>

    <!-- CSS Styles -->
    <style>
        /* Disable dragging for all elements */
        * {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap');

        :root {
            /* Updated color variables for Vision Pro style */
            --bg-color: rgba(255, 255, 255, 0.18);
            --text-color: #333333;
            --item-bg: rgba(255, 255, 255, 0.15);
            --item-border: rgba(255, 255, 255, 0.2);
            --item-hover: rgba(255, 255, 255, 0.25);
            --item-selected: rgba(51, 51, 51, 0.15);
            --shadow-light: rgba(255, 255, 255, 0.5);
            --shadow-dark: rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #cfeaff 0%, #f3f3f4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: var(--text-color);
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            transition: all 0.3s ease;
        }

        .container {
            background: var(--bg-color);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 18px;
            padding: 60px;
            box-shadow: 
                0 8px 24px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
            max-width: 1000px;
            width: 100%;
            position: relative;
            padding-top: 80px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            max-height: 2000px;
            height: 100%;
            border: 1px solid var(--item-border);
            animation: containerFadeIn 0.5s ease-out;
            overflow: visible;
        }

        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-weight: 500;
            font-size: 3em;
            color: var(--text-color);
        }

        p {
            font-size: 1.5em;
            text-align: center;
            color: var(--text-color);
            margin-bottom: 40px;
        }

        .home-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .home-option {
            background: var(--item-bg);
            border: 1px solid var(--item-border);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: inherit;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 
                0 4px 6px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
            position: relative;
            z-index: 1;
            height: 180px;
        }

        .home-option:hover {
            background: var(--item-hover);
            transform: translateY(-4px);
            box-shadow: 
                0 8px 16px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .home-option img {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .home-option p {
            margin: 0;
            font-weight: 400;
            font-size: 1.8em;
            color: var(--text-color);
        }

        .navigation {
            display: flex;
            justify-content: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--item-border);
        }

        .nav-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            padding: 12px 24px;
            margin: 0 10px;
            text-decoration: none;
            color: var(--text-color);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            font-size: 1.2em;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.1),
                rgba(255, 255, 255, 0.05)
            );
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.15),
                inset 0 0 0 1px rgba(255, 255, 255, 0.15),
                inset 0 0 0 2px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .nav-item:hover::before {
            opacity: 1;
        }

        .nav-item:active {
            transform: translateY(0);
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 
                0 16px 48px rgba(0, 0, 0, 0.2),
                inset 0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 0 0 2px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .toggle-switch {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .toggle-input {
            display: none;
        }

        .toggle-label {
            display: inline-block;
            width: 60px;
            height: 34px;
            background-color: var(--text-color);
            border-radius: 34px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .toggle-label:before {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            top: 4px;
            left: 4px;
            background-color: var(--bg-color);
            transition: 0.3s ease;
        }

        .toggle-input:checked+.toggle-label {
            background-color: #ccc;
        }

        .toggle-input:checked+.toggle-label:before {
            transform: translateX(26px);
            background-color: var(--text-color);
        }

        .dark-mode {
            --bg-color: rgba(0, 0, 0, 0.18);
            --text-color: #ffffff;
            --item-bg: rgba(255, 255, 255, 0.1);
            --item-border: rgba(255, 255, 255, 0.1);
            --item-hover: rgba(255, 255, 255, 0.15);
            --item-selected: rgba(255, 255, 255, 0.2);
            --shadow-light: rgba(255, 255, 255, 0.1);
            --shadow-dark: rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2e 100%);
        }

        .dark-mode .container {
            box-shadow: 
                0 8px 24px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .dark-mode .nav-item {
            background: rgba(0, 0, 0, 0.05);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.2),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 0 0 2px rgba(255, 255, 255, 0.02);
        }

        .dark-mode .nav-item:hover {
            background: rgba(0, 0, 0, 0.08);
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.25),
                inset 0 0 0 1px rgba(255, 255, 255, 0.08),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .dark-mode .nav-item:active {
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.15),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 0 0 2px rgba(255, 255, 255, 0.02);
        }

        .home-button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            text-decoration: none;
            color: var(--text-color);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            z-index: 1;
            font-size: 1.2em;
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.15),
                inset 0 0 0 1px rgba(255, 255, 255, 0.15),
                inset 0 0 0 2px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .home-options {
                grid-template-columns: repeat(2, 1fr);
            }
            .container {
                padding: 30px;
                padding-top: 60px;
            }
            .home-option {
                padding: 20px;
                height: 150px;
            }
            .home-option img {
                width: 60px;
                height: 60px;
            }
            .home-option p {
                font-size: 1.5em;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Home Button -->

        <!-- Toggle Switch -->
        <div class="toggle-switch">
            <input type="checkbox" id="switch" class="toggle-input" />
            <label for="switch" class="toggle-label"></label>
        </div>

        <!-- Title -->
        <h1>Welcome to VoxEasy</h1>
        <!-- Introductory Paragraph -->
        <p>Your Communication Companion For Personalized Care And Support</p>

        <!-- Options Grid -->
        <div class="home-options">
            <a href="provider.html" class="home-option">
                <img src="https://api.iconify.design/mdi:account-supervisor.svg?color=black" alt="Provider">
                <p>I am a provider</p>
            </a>
            <a href="login_patient.html" class="home-option">
                <img src="https://api.iconify.design/mdi:account-outline.svg?color=black" alt="User">
                <p>I am a user</p>
            </a>
        </div>

        <!-- Navigation Bar -->
    </div>

    <!-- JavaScript -->
    <script>
        const toggleSwitch = document.getElementById('switch');
        const body = document.body;

        // Check the initial state from local storage
        if (localStorage.getItem('darkMode') === 'enabled') {
            body.classList.add('dark-mode');
            toggleSwitch.checked = true;
            updateIconColors('white');
        }

        toggleSwitch.addEventListener('change', function () {
            if (this.checked) {
                console.log('Switch is ON - Dark Mode');
                body.classList.add('dark-mode');
                localStorage.setItem('darkMode', 'enabled');
                updateIconColors('white');
            } else {
                console.log('Switch is OFF - Light Mode');
                body.classList.remove('dark-mode');
                localStorage.setItem('darkMode', 'disabled');
                updateIconColors('black');
            }
        });

        function updateIconColors(color) {
            const icons = document.querySelectorAll('.home-option img');
            icons.forEach(icon => {
                const currentSrc = icon.src;
                const newSrc = currentSrc.replace(/color=[^&]+/, `color=${color}`);
                icon.src = newSrc;
            });
        }

        console.log('Home page script loaded');
    </script>
</body>

</html>
