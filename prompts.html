<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxEasy - Prompts</title>
    <style>
        /* Disable dragging for all elements */
        * {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap');

        :root {
            /* Updated color variables for Vision Pro style */
            --bg-color: rgba(255, 255, 255, 0.18);
            --text-color: #333333;
            --item-bg: rgba(255, 255, 255, 0.15);
            --item-border: rgba(255, 255, 255, 0.2);
            --item-hover: rgba(255, 255, 255, 0.25);
            --item-selected: rgba(51, 51, 51, 0.15);
            --shadow-light: rgba(255, 255, 255, 0.5);
            --shadow-dark: rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #cfeaff 0%, #f3f3f4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: var(--text-color);
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            transition: all 0.3s ease;
        }

        .container {
            background: var(--bg-color);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 18px;
            padding: 30px;
            box-shadow: 
                0 8px 24px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
            max-width: 1500px;
            width: 100%;
            position: relative;
            padding-top: 70px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--item-border);
            animation: containerFadeIn 0.5s ease-out;
        }

        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .navigation {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--item-border);
        }

        .nav-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            padding: 12px 24px;
            margin: 0 5px;
            text-decoration: none;
            color: var(--text-color);
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.1),
                rgba(255, 255, 255, 0.05)
            );
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.15),
                inset 0 0 0 1px rgba(255, 255, 255, 0.15),
                inset 0 0 0 2px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .nav-item:hover::before {
            opacity: 1;
        }

        .nav-item:active {
            transform: translateY(0);
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.05);
        }

        .toggle-switch {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .toggle-input {
            display: none;
        }

        .toggle-label {
            display: inline-block;
            width: 60px;
            height: 34px;
            background-color: var(--text-color);
            border-radius: 34px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .toggle-label:before {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            top: 4px;
            left: 4px;
            background-color: var(--bg-color);
            transition: 0.3s ease;
        }

        .toggle-input:checked + .toggle-label {
            background-color: #ccc;
        }

        .toggle-input:checked + .toggle-label:before {
            transform: translateX(26px);
            background-color: var(--text-color);
        }

        .dark-mode {
            --bg-color: rgba(0, 0, 0, 0.18);
            --text-color: #ffffff;
            --item-bg: rgba(255, 255, 255, 0.1);
            --item-border: rgba(255, 255, 255, 0.1);
            --item-hover: rgba(255, 255, 255, 0.15);
            --item-selected: rgba(255, 255, 255, 0.2);
            --shadow-light: rgba(255, 255, 255, 0.1);
            --shadow-dark: rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2e 100%);
        }

        .dark-mode .container {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .dark-mode .nav-item {
            background: rgba(0, 0, 0, 0.05);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.2),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 0 0 2px rgba(255, 255, 255, 0.02);
        }

        .dark-mode .nav-item:hover {
            background: rgba(0, 0, 0, 0.08);
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.25),
                inset 0 0 0 1px rgba(255, 255, 255, 0.08),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .dark-mode .nav-item:active {
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.15),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 0 0 2px rgba(255, 255, 255, 0.02);
        }

        /* Styles for prompts.html, adjusted to match index.html */

        .prompts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 15px;
            margin: 0;
        }

        .prompts-container .section {
            padding: 15px;
            box-sizing: border-box;
            border: 1px solid var(--item-border);
            background: var(--item-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 
                0 4px 12px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
            transition: all 0.3s ease;
        }

        .prompts-container .title {
            font-size: 20px;
            margin-bottom: 12px;
            color: var(--text-color);
            font-weight: 500;
        }

        .prompts-container .grid {
            display: grid;
            gap: 12px;
        }

        .prompts-container .grid-4x4 {
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, auto);
        }

        .prompts-container .grid-2x4 {
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, auto);
        }

        .prompts-container .button {
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            background: var(--item-bg);
            border: 1px solid var(--item-border);
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            transition: all 0.3s ease;
            color: var(--text-color);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 
                0 4px 6px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .prompts-container .button:active {
            transform: translateY(0);
            box-shadow: 
                0 2px 4px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .prompts-container .button img {
            max-width: 50px;
            max-height: 50px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .yes-button {
            background: linear-gradient(135deg, rgba(40, 167, 69, 0.7), rgba(40, 167, 69, 0.5)) !important;
            color: white !important;
            font-weight: 500;
        }

        .no-button {
            background: linear-gradient(135deg, rgba(220, 53, 69, 0.7), rgba(220, 53, 69, 0.5)) !important; 
            color: white !important;
            font-weight: 500;
        }

        .prompts-container .placeholder {
            color: var(--item-border);
            text-align: center;
            font-style: italic;
            padding: 15px;
        }

        @media (max-width: 800px) {
            .prompts-container {
                grid-template-columns: 1fr;
            }
        }

        .nav-item[href="prompts.html"] {
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 
                0 16px 48px rgba(0, 0, 0, 0.2),
                inset 0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 0 0 2px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-item[href="prompts.html"]::before {
            opacity: 1;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.15),
                rgba(255, 255, 255, 0.08)
            );
        }

        .dark-mode .nav-item[href="prompts.html"] {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 16px 48px rgba(0, 0, 0, 0.3),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .top-right-container {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.2em;
            color: var(--text-color);
        }

        .logout-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .logout-button {
            background-color: rgba(255, 59, 48, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            box-shadow: 
                0 4px 6px var(--shadow-dark),
                inset 0 1px 1px var(--shadow-light);
        }

        .prompts-container .section:nth-child(3) {
            display: flex;
            flex-direction: column;
        }

        .prompts-container .section:nth-child(3) #selected-choices {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #selected-choices .button {
            font-size: 20px;
            padding: 15px;
            min-height: 60px;
            margin-top: 0;
            width: 80%;
        }

        #selected-choices .placeholder {
            margin: auto;
        }

        /* Make "SELECTED CHOICES" title bigger */
        .prompts-container .section:nth-child(3) .title {
            font-size: 22px;
            font-weight: 600;
        }

    </style>
</head>
<body>
    <div class="container">
        <!-- Toggle switch -->
        <div class="toggle-switch">
            <input type="checkbox" id="switch" class="toggle-input" />
            <label for="switch" class="toggle-label"></label>
        </div>

        <!-- Add logout button -->
        <div class="logout-container">
            <button class="logout-button" onclick="window.location.href='index.html'">Logout</button>
        </div>

        <!-- Patient's name displayed in the top right -->
        <div class="top-right-container">
            <span id="patient-name"></span>
        </div>

        <br>
        
        <!-- Prompts content -->
        <div class="prompts-container">
            <!-- Top Left: I Am Section -->
            <div class="section">
                <div class="title">I AM</div>
                <div class="grid grid-4x4">
                    <button class="button" onclick="speakText('I am excited')">
                        Excited
                    </button>
                    <button class="button" onclick="speakText('I am tired')">
                        Tired
                    </button>
                    <button class="button" onclick="speakText('I am hungry')">
                        Hungry
                    </button>
                    <button class="button" onclick="speakText('I am bored')">
                        Bored
                    </button>
                    <button class="button" onclick="speakText('I am anxious')">
                        Anxious
                    </button>
                    <button class="button" onclick="speakText('I am calm')">
                        Calm
                    </button>
                    <button class="button" onclick="speakText('I am confused')">
                        Confused
                    </button>
                    <button class="button" onclick="speakText('I am focused')">
                        Focused
                    </button>
                    <button class="button" onclick="speakText('I am relaxed')">
                        Relaxed
                    </button>
                    <button class="button" onclick="speakText('I am stressed')">
                        Stressed
                    </button>
                    <button class="button" onclick="speakText('I am surprised')">
                        Surprised
                    </button>
                    <button class="button" onclick="speakText('I am grateful')">
                        Grateful
                    </button>
                </div>
            </div>

            <!-- Top Right: I Want Section -->
            <div class="section">
                <div class="title">I WANT</div>
                <div class="grid grid-4x4">
                    <button class="button" onclick="speakText('I want to eat')">
                        To Eat
                    </button>
                    <button class="button" onclick="speakText('I want to sleep')">
                        To Sleep
                    </button>
                    <button class="button" onclick="speakText('I want to read')">
                        To Read
                    </button>
                    <button class="button" onclick="speakText('I want to watch TV')">
                        To Watch TV
                    </button>
                    <button class="button" onclick="speakText('I want to listen to music')">
                        To Listen to Music
                    </button>
                    <button class="button" onclick="speakText('I want to draw')">
                        To Draw
                    </button>
                    <button class="button" onclick="speakText('I want to be comforted')">
                        To Be Comforted
                    </button>
                    <button class="button" onclick="speakText('I want to drink water')">
                        To Drink Water
                    </button>
                    <button class="button" onclick="speakText('I want to dance')">
                        To Dance
                    </button>
                    <button class="button" onclick="speakText('I want to exercise')">
                        To Exercise
                    </button>
                    <button class="button" onclick="speakText('I want to talk')">
                        To Talk
                    </button>
                    <button class="button" onclick="speakText('I want to relax')">
                        To Relax
                    </button>
                </div>
            </div>

            <!-- New Selected Choices Section -->
            <div class="section">
                <div class="title">SELECTED CHOICES</div>
                <div id="selected-choices" class="grid">
                    <div class="placeholder">No choices selected yet.</div>
                </div>
            </div>

            <!-- Bottom Right: I Want to See Section -->
            <div class="section">
                <div class="title">I WANT TO SEE</div>
                <div class="grid grid-2x4">
                    <button class="button" onclick="speakText('I want to see my family')">
                        My Family
                    </button>
                    <button class="button" onclick="speakText('I want to see the nurse')">
                        The Nurse
                    </button>
                    <button class="button" onclick="speakText('I want to see my friends')">
                        My Friends
                    </button>
                    <button class="button" onclick="speakText('I want to see the doctor')">
                        The Doctor
                    </button>
                </div>
                <div class="grid grid-2x4">
                    <button class="button yes-button" onclick="speakText('Yes')">
                        Yes
                    </button>
                    <button class="button no-button" onclick="speakText('No')">
                        No
                    </button>
                    <button class="button" onclick="speakText('Stop')">
                        Stop
                    </button>
                    <button class="button" onclick="speakText('Go')">
                        Go
                    </button>
                </div>
            </div>
        </div>
        <!-- Navigation bar -->
        <nav class="navigation">
            <a href="pic.html" class="nav-item">Picture Board</a>   
            <a href="prompts.html" class="nav-item">Prompts</a>         
            <a href="pain.html" class="nav-item">Pain</a>
            <a href="keyboard.html" class="nav-item">Keyboard</a>
            <a href="voxai.html" class="nav-item">VoxAI</a>
            <a href="documents.html" class="nav-item">Documents</a>
            <a href="mood.html" class="nav-item">Mood</a>
        </nav>
    </div>
    <script>
        // Function to speak text using the Web Speech API
        function speak(text) {
            console.log('Speaking:', text);
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                window.speechSynthesis.speak(utterance);
            } else {
                console.log('Text-to-speech is not supported in this browser.');
                alert('Text-to-speech is not supported in this browser.');
            }
        }

        // Alias 'speakText' to 'speak' for compatibility
        function speakText(text) {
            speak(text);
            updateSelectedChoices(text);
        }

        function updateSelectedChoices(text) {
            const selectedChoicesContainer = document.getElementById('selected-choices');
            selectedChoicesContainer.innerHTML = ''; // Clear previous choice or placeholder
            const choiceElement = document.createElement('div');
            choiceElement.className = 'button';
            choiceElement.textContent = text;
            choiceElement.style.fontSize = '20px'; // Ensure dynamically added choices have big text
            selectedChoicesContainer.appendChild(choiceElement);
        }

        // Core logging functionality
        function logAction(action) {
            const timestamp = new Date().toISOString();
            const logEntry = { action, timestamp };
            
            const log = JSON.parse(localStorage.getItem('ccpcsLog') || '[]');
            log.push(logEntry);
            localStorage.setItem('ccpcsLog', JSON.stringify(log));
        }

        // Add click event listeners to all prompt buttons
        document.querySelectorAll('.prompt-button').forEach(button => {
            button.addEventListener('click', function() {
                const promptText = this.textContent.trim();
                
                // Speak the text
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); // Cancel any ongoing speech
                    const utterance = new SpeechSynthesisUtterance(promptText);
                    window.speechSynthesis.speak(utterance);
                }

                // Log the action
                logAction(`Prompt Spoken: "${promptText}"`);
            });
        });

        // Dark mode functionality
        const toggleSwitch = document.getElementById('switch');
        const body = document.body;

        // Check the initial state from local storage
        if (localStorage.getItem('darkMode') === 'enabled') {
            body.classList.add('dark-mode');
            toggleSwitch.checked = true;
            updateIconColors('white');
        }

        toggleSwitch.addEventListener('change', function() {
            if (this.checked) {
                body.classList.add('dark-mode');
                localStorage.setItem('darkMode', 'enabled');
                updateIconColors('white');
            } else {
                body.classList.remove('dark-mode');
                localStorage.setItem('darkMode', 'disabled');
                updateIconColors('black');
            }
        });

        function updateIconColors(color) {
            const icons = document.querySelectorAll('.prompt-item img');
            icons.forEach(icon => {
                const currentSrc = icon.src;
                const newSrc = currentSrc.replace(/color=[^&]+/, `color=${color}`);
                icon.src = newSrc;
            });
        }

        // Display patient name
        const currentPatient = JSON.parse(localStorage.getItem('currentPatient'));
        if (currentPatient) {
            const patientNameElement = document.getElementById('patient-name');
            if (patientNameElement) {
                patientNameElement.textContent = `${currentPatient.firstName} ${currentPatient.lastName}`;
            }
        }

        // Optional: Add general click logging for other buttons
        document.addEventListener('click', function(event) {
            const clickedElement = event.target;
            
            // Don't log navigation items or prompt buttons (they're handled separately)
            if (clickedElement.classList.contains('nav-item') || 
                clickedElement.classList.contains('prompt-button')) {
                return;
            }

            // Log other button clicks
            const textContent = clickedElement.textContent.trim();
            if (textContent && clickedElement.tagName === 'BUTTON') {
                logAction(`Button Clicked: "${textContent}"`);
            }
        });

    </script>
</body>
</html>
